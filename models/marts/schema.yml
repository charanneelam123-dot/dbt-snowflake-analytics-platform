version: 2

models:

  # ─── fact_orders ─────────────────────────────────────────────────────────────
  - name: fact_orders
    description: >
      Kimball transaction fact table at order LINE ITEM grain.
      Loaded incrementally via MERGE on order_line_sk.
      Covers all TPC-H orders from 1992 to present.

      Additive measures: quantity, extended_price, net_revenue, gross_revenue,
      discount_amount, tax_amount, days_to_ship, days_in_transit,
      total_fulfillment_days.

      Non-additive (average only): discount_rate, tax_rate,
      estimated_margin_pct.
    config:
      contract:
        enforced: false
    columns:
      - name: order_line_sk
        description: Surrogate key — MD5 hash of order_key + line_number.
        tests:
          - not_null
          - unique
          - {config: {severity: error}}
      - name: customer_sk
        description: FK to dim_customer. -1 if customer not found (unknown member).
        tests: [not_null]
      - name: product_sk
        description: FK to dim_product. -1 if product not found.
        tests: [not_null]
      - name: order_date_sk
        description: FK to dim_date on order_date.
        tests: [not_null]
      - name: ship_date_sk
        description: FK to dim_date on ship_date.
      - name: order_key
        tests: [not_null]
      - name: line_number
        tests: [not_null]
      - name: quantity
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: "> 0"}}
      - name: net_revenue
        description: Extended price after discount, before tax. Additive.
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: ">= 0"}}
      - name: gross_revenue
        description: Net revenue including tax. Additive.
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: ">= net_revenue"}}
      - name: discount_amount
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: ">= 0"}}
      - name: discount_rate
        description: "Fractional discount [0, 1]. NOT additive — use weighted avg."
        tests:
          - {dbt_utils.expression_is_true: {expression: "between 0 and 1"}}
      - name: delivery_status
        tests:
          - not_null
          - accepted_values:
              values: ['On-Time', 'Late']
      - name: is_late_delivery
        tests: [not_null]
      - name: is_returned
        tests: [not_null]
      - name: order_status
        tests:
          - accepted_values:
              values: ['O', 'F', 'P']
      - name: fiscal_year
        tests: [not_null]
      - name: fiscal_quarter
        description: "Fiscal quarter number [1, 4]."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4]
      - name: days_to_ship
        description: Calendar days from order placed to shipment.
        tests:
          - {dbt_utils.expression_is_true:
              {expression: ">= 0",
               config: {severity: warn}}}  # warn only — source data has a few edge cases
      - name: _dbt_loaded_at
        description: Timestamp this row was written by dbt.
        tests: [not_null]

  # ─── dim_customer ─────────────────────────────────────────────────────────────
  - name: dim_customer
    description: >
      Kimball SCD Type 2 customer dimension. Tracks changes to account_tier,
      market_segment, nation_name, region_name, account_balance over time.

      Every version of a customer gets a unique customer_sk.
      Joins to fact_orders on customer_sk (for point-in-time correct joins)
      or on customer_key + is_current = true (for current-state analysis).
    columns:
      - name: customer_sk
        description: Surrogate key — unique per customer version.
        tests: [not_null, unique]
      - name: customer_key
        description: Natural key from source system.
        tests: [not_null]
      - name: customer_name
        tests: [not_null]
      - name: market_segment
        tests:
          - not_null
          - accepted_values:
              values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'HOUSEHOLD', 'MACHINERY']
      - name: account_tier
        tests:
          - not_null
          - accepted_values:
              values: ['Negative', 'Bronze', 'Silver', 'Gold', 'Platinum']
      - name: effective_from
        tests: [not_null]
      - name: effective_to
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: _dbt_scd_id
        description: Row-level hash of all tracked SCD2 attributes.
        tests: [not_null, unique]

  # ─── dim_date ─────────────────────────────────────────────────────────────────
  - name: dim_date
    description: >
      Conformed date dimension covering 1992-01-01 through 2030-12-31.
      Includes both Gregorian and fiscal calendar (Oct 1 fiscal year start).
    columns:
      - name: date_sk
        description: Integer surrogate key in YYYYMMDD format.
        tests: [not_null, unique]
      - name: full_date
        tests: [not_null, unique]
      - name: calendar_year
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: "between 1992 and 2030"}}
      - name: calendar_month
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: "between 1 and 12"}}
      - name: day_of_week
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: "between 0 and 6"}}
      - name: fiscal_year
        tests: [not_null]
      - name: fiscal_quarter
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4]
      - name: is_weekend
        tests: [not_null]
      - name: is_weekday
        tests: [not_null]

  # ─── dim_product ──────────────────────────────────────────────────────────────
  - name: dim_product
    description: >
      Product dimension (SCD Type 1 — last value wins).
      One row per part in the TPC-H catalogue.
    columns:
      - name: product_sk
        description: Surrogate key.
        tests: [not_null, unique]
      - name: product_key
        description: Natural key from source.
        tests: [not_null, unique]
      - name: product_name
        tests: [not_null]
      - name: retail_price
        tests:
          - not_null
          - {dbt_utils.expression_is_true: {expression: "> 0"}}
      - name: estimated_margin_pct
        description: "(retail - supply_cost) / retail. NULL if no supplier data."
